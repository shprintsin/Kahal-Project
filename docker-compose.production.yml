services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: kahal-app
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://shnyor:***REDACTED***@shtetl-postgres:5432/shtetl_db
    networks:
      - kahal
      - postgres-net

  nginx:
    image: nginx:alpine
    container_name: kahal-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - kahal

networks:
  kahal:
    driver: bridge
  postgres-net:
    external: true
    name: shtetl-db_default
